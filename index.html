<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MNLive — Live Television</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
  <style>
    :root {
      --bg-primary: #0a0d14;
      --bg-secondary: #10141f;
      --bg-card: #141824;
      --bg-hover: #1a2030;
      --accent: #e8b84b;
      --accent-dim: rgba(232,184,75,0.12);
      --accent-glow: rgba(232,184,75,0.25);
      --text-primary: #f0f2f7;
      --text-secondary: #8a92a8;
      --text-muted: #50596e;
      --border: rgba(255,255,255,0.06);
      --border-accent: rgba(232,184,75,0.35);
      --red: #e84b4b;
      --sidebar-w: 320px;
      --header-h: 64px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Outfit', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
    }

    /* ── HEADER ───────────────────────────── */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: var(--header-h);
      background: rgba(10,13,20,0.95);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 24px;
      gap: 16px;
    }

    .logo {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700; font-size: 16px;
      color: #0a0d14;
      letter-spacing: -0.5px;
      flex-shrink: 0;
    }
    .logo-text {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700; font-size: 22px;
      color: var(--text-primary);
      letter-spacing: 1px;
    }
    .logo-text span { color: var(--accent); }

    .live-badge {
      display: flex; align-items: center; gap: 6px;
      background: rgba(232,75,75,0.15);
      border: 1px solid rgba(232,75,75,0.3);
      border-radius: 20px;
      padding: 3px 10px 3px 8px;
      font-size: 11px; font-weight: 600;
      color: var(--red);
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }
    .live-dot {
      width: 7px; height: 7px;
      background: var(--red);
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50% { opacity:0.4; transform:scale(0.7); }
    }

    .header-search {
      margin-left: auto;
      display: flex; align-items: center;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 12px;
      gap: 8px;
      height: 36px;
      width: 220px;
      transition: border-color 0.2s, width 0.3s;
    }
    .header-search:focus-within {
      border-color: var(--border-accent);
      width: 280px;
    }
    .header-search svg { color: var(--text-muted); flex-shrink:0; }
    .header-search input {
      background: none; border: none; outline: none;
      font-family: 'Outfit', sans-serif;
      font-size: 13px; color: var(--text-primary);
      width: 100%;
    }
    .header-search input::placeholder { color: var(--text-muted); }

    .menu-btn {
      display: none;
      background: none; border: none;
      color: var(--text-secondary);
      cursor: pointer; padding: 4px;
      margin-left: auto;
    }
    @media(max-width:768px) {
      .menu-btn { display:flex; }
      .header-search { display:none; }
    }

    /* ── LAYOUT ───────────────────────────── */
    .app {
      display: flex;
      height: 100vh;
      padding-top: var(--header-h);
    }

    /* ── SIDEBAR ──────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      height: calc(100vh - var(--header-h));
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
      transition: transform 0.3s ease;
    }
    @media(max-width:768px) {
      .sidebar {
        position: fixed; top: var(--header-h); left: 0; bottom: 0;
        z-index: 90; transform: translateX(-100%);
      }
      .sidebar.open { transform: translateX(0); }
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sidebar-title {
      font-size: 11px; font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 1.2px;
      margin-bottom: 12px;
    }

    /* Category tabs */
    .cat-tabs {
      display: flex; gap: 6px;
      flex-wrap: wrap;
    }
    .cat-tab {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: none;
      font-family: 'Outfit', sans-serif;
      font-size: 12px; font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .cat-tab:hover {
      border-color: var(--border-accent);
      color: var(--accent);
    }
    .cat-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0a0d14;
      font-weight: 600;
    }

    /* Channel list */
    .channel-list {
      flex: 1; overflow-y: auto;
      padding: 8px;
    }
    .channel-list::-webkit-scrollbar { width: 4px; }
    .channel-list::-webkit-scrollbar-track { background: transparent; }
    .channel-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .channel-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
      border: 1px solid transparent;
      margin-bottom: 2px;
    }
    .channel-item:hover { background: var(--bg-hover); }
    .channel-item.active {
      background: var(--accent-dim);
      border-color: var(--border-accent);
    }

    .channel-logo {
      width: 44px; height: 44px;
      border-radius: 8px;
      background: var(--bg-card);
      object-fit: contain;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }
    .channel-logo-placeholder {
      width: 44px; height: 44px;
      border-radius: 8px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px; font-weight: 700;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .channel-info { flex: 1; min-width: 0; }
    .channel-name {
      font-size: 14px; font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .channel-item.active .channel-name { color: var(--accent); }
    .channel-group {
      font-size: 11px; color: var(--text-muted);
      margin-top: 2px;
    }

    .ch-now { flex-shrink: 0; }
    .ch-live {
      font-size: 10px; font-weight: 600;
      color: var(--red);
      text-transform: uppercase; letter-spacing: 0.5px;
    }

    .channel-count {
      padding: 10px 16px 6px;
      font-size: 11px; color: var(--text-muted);
      flex-shrink: 0;
    }

    /* ── MAIN ─────────────────────────────── */
    .main {
      flex: 1;
      height: calc(100vh - var(--header-h));
      overflow-y: auto;
      display: flex; flex-direction: column;
    }
    .main::-webkit-scrollbar { width: 4px; }
    .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Player area */
    .player-section {
      background: #000;
      position: relative;
      width: 100%;
    }
    .player-wrapper {
      position: relative;
      padding-bottom: 56.25%; /* 16:9 */
      height: 0;
    }
    video {
      position: absolute;
      inset: 0; width: 100%; height: 100%;
      background: #000;
    }

    /* Player overlay info */
    .player-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 40px 20px 16px;
      background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
      display: flex; align-items: flex-end; gap: 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .player-section:hover .player-overlay { opacity: 1; }

    .overlay-logo {
      width: 48px; height: 48px;
      border-radius: 8px;
      object-fit: contain;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
    }
    .overlay-info { flex: 1; }
    .overlay-name {
      font-size: 18px; font-weight: 600;
      color: #fff;
    }
    .overlay-group {
      font-size: 13px; color: rgba(255,255,255,0.6);
      margin-top: 2px;
    }

    /* Loading / error state */
    .player-placeholder {
      position: absolute;
      inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #000;
      gap: 16px;
    }
    .placeholder-icon {
      width: 64px; height: 64px;
      border-radius: 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
    }
    .placeholder-text {
      font-size: 15px; color: var(--text-muted);
    }
    .placeholder-hint {
      font-size: 12px; color: var(--text-muted);
      opacity: 0.6;
    }

    /* Loading spinner */
    .player-loading {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.6);
    }
    .player-loading.show { display: flex; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(232,184,75,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Now playing info bar */
    .now-playing-bar {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex; align-items: center; gap: 14px;
    }
    .np-logo {
      width: 36px; height: 36px;
      border-radius: 6px;
      object-fit: contain;
      background: var(--bg-card);
      border: 1px solid var(--border);
    }
    .np-info { flex: 1; min-width: 0; }
    .np-label {
      font-size: 10px; font-weight: 600;
      color: var(--accent);
      text-transform: uppercase; letter-spacing: 1px;
    }
    .np-name {
      font-size: 15px; font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .np-group {
      font-size: 12px; color: var(--text-muted);
    }
    .np-badge {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 10px;
      background: rgba(232,75,75,0.12);
      border: 1px solid rgba(232,75,75,0.25);
      border-radius: 20px;
      font-size: 11px; font-weight: 600;
      color: var(--red);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .np-dot {
      width: 6px; height: 6px;
      background: var(--red);
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }

    /* ── CHANNEL GRID (all channels below) ── */
    .grid-section {
      padding: 24px 20px;
      flex: 1;
    }
    .section-header {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 16px;
    }
    .section-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 18px; font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0.5px;
    }
    .section-count {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2px 10px;
      font-size: 12px; color: var(--text-muted);
    }

    .group-block { margin-bottom: 32px; }
    .group-label {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 12px;
    }
    .group-name {
      font-size: 12px; font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 1px;
    }
    .group-line {
      flex: 1; height: 1px;
      background: var(--border);
    }
    .group-cnt {
      font-size: 11px; color: var(--text-muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px;
    }

    .grid-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 10px;
      display: flex; flex-direction: column;
      align-items: center; gap: 10px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .grid-card:hover {
      background: var(--bg-hover);
      border-color: rgba(232,184,75,0.2);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .grid-card.active {
      border-color: var(--accent);
      background: var(--accent-dim);
      box-shadow: 0 0 0 1px var(--accent-glow);
    }
    .grid-logo {
      width: 52px; height: 52px;
      object-fit: contain;
      border-radius: 8px;
      background: var(--bg-secondary);
    }
    .grid-logo-ph {
      width: 52px; height: 52px;
      border-radius: 8px;
      background: var(--bg-secondary);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px; font-weight: 700;
      color: var(--text-muted);
    }
    .grid-name {
      font-size: 12px; font-weight: 500;
      color: var(--text-secondary);
      line-height: 1.3;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .grid-card.active .grid-name { color: var(--accent); }

    /* ── EMPTY / LOADING STATES ─────────── */
    .state-msg {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px 20px; gap: 12px;
      color: var(--text-muted);
    }
    .state-msg svg { opacity: 0.3; }
    .state-msg p { font-size: 14px; }

    /* ── TOAST ───────────────────────────── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--bg-card);
      border: 1px solid var(--border-accent);
      color: var(--text-primary);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; }

    /* ── OVERLAY backdrop ────────────────── */
    .backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 89;
    }
    .backdrop.show { display: block; }

    /* ── RESPONSIVE ──────────────────────── */
    @media(max-width:1024px) {
      :root { --sidebar-w: 280px; }
    }
    @media(max-width:768px) {
      .main { height: calc(100vh - var(--header-h)); }
      .grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <a class="logo" href="#">
    <div class="logo-icon">MN</div>
    <span class="logo-text">MN<span>Live</span></span>
  </a>
  <div class="live-badge">
    <span class="live-dot"></span> Live TV
  </div>
  <div class="header-search">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Search channels…"/>
  </div>
  <button class="menu-btn" id="menuBtn" aria-label="Toggle menu">
    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
</header>

<div class="backdrop" id="backdrop"></div>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Categories</div>
      <div class="cat-tabs" id="catTabs">
        <button class="cat-tab active" data-cat="all">All</button>
      </div>
    </div>
    <div class="channel-count" id="channelCount">Loading…</div>
    <div class="channel-list" id="channelList">
      <div class="state-msg">
        <p>Loading channels…</p>
      </div>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main" id="main">
    <!-- Player -->
    <div class="player-section">
      <div class="player-wrapper">
        <video id="videoPlayer" controls></video>
        <div class="player-placeholder" id="playerPlaceholder">
          <div class="placeholder-icon">
            <svg width="28" height="28" fill="none" stroke="#8a92a8" stroke-width="1.5" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
          </div>
          <p class="placeholder-text">Select a channel to start watching</p>
          <p class="placeholder-hint">Choose from the list on the left</p>
        </div>
        <div class="player-loading" id="playerLoading">
          <div class="spinner"></div>
        </div>
        <div class="player-overlay" id="playerOverlay">
          <img class="overlay-logo" id="overlayLogo" src="" alt=""/>
          <div class="overlay-info">
            <div class="overlay-name" id="overlayName">—</div>
            <div class="overlay-group" id="overlayGroup">—</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Now Playing Bar -->
    <div class="now-playing-bar" id="nowPlayingBar" style="display:none">
      <img class="np-logo" id="npLogo" src="" alt=""/>
      <div class="np-info">
        <div class="np-label">Now Playing</div>
        <div class="np-name" id="npName">—</div>
        <div class="np-group" id="npGroup">—</div>
      </div>
      <div class="np-badge">
        <span class="np-dot"></span> Live
      </div>
    </div>

    <!-- Channel Grid -->
    <div class="grid-section" id="gridSection">
      <div class="section-header">
        <span class="section-title">All Channels</span>
        <span class="section-count" id="gridCount">0</span>
      </div>
      <div id="groupedGrid"></div>
    </div>
  </main>
</div>

<div id="toast"></div>

<script>
// ── STATE ──────────────────────────────────────────────
let allChannels = [];
let filteredChannels = [];
let currentCat = 'all';
let currentChannel = null;
let hls = null;

// ── LOAD CHANNELS ──────────────────────────────────────
async function loadChannels() {
  try {
    const res = await fetch('channels.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    allChannels = Array.isArray(data) ? data : data.channels || [];
    init();
  } catch(e) {
    // Demo/fallback channels if no JSON file found
    allChannels = [
      { name:"Ananda TV",    logo:"https://s3.aynaott.com/storage/897698f593fc07974fc46881a440733d", group:"Bangla", url:"https://tvsen6.aynaott.com/anandatv/index.m3u8?e=1779283759&u=78be6644-0a65-48ec-81a4-089ac65a2619&token=504b9350b4703116ca4ab20e4013288e" },
      { name:"Jamuna TV",    logo:"https://upload.wikimedia.org/wikipedia/en/2/29/Jamuna_TV_logo.png", group:"Bangla", url:"" },
      { name:"NTV",          logo:"https://upload.wikimedia.org/wikipedia/en/f/f3/NTV_Bangladesh_Logo.png", group:"Bangla", url:"" },
      { name:"Channel i",    logo:"https://upload.wikimedia.org/wikipedia/en/2/27/Channel-i-logo.jpg", group:"Bangla", url:"" },
      { name:"Somoy TV",     logo:"https://upload.wikimedia.org/wikipedia/en/b/b7/Somoy_TV_logo.png", group:"News", url:"" },
      { name:"ATN News",     logo:"https://upload.wikimedia.org/wikipedia/en/b/b8/ATN_News_Logo.png", group:"News", url:"" },
      { name:"BBC World",    logo:"https://upload.wikimedia.org/wikipedia/commons/6/62/BBC_World_News_2022_%28Boxed%29.svg", group:"International", url:"" },
      { name:"Al Jazeera",   logo:"https://upload.wikimedia.org/wikipedia/en/4/40/Al_Jazeera_English_logo.svg", group:"International", url:"" },
      { name:"Star Sports",  logo:"https://upload.wikimedia.org/wikipedia/en/a/a5/Star_Sports_logo.svg", group:"Sports", url:"" },
      { name:"Ten Sports",   logo:"https://upload.wikimedia.org/wikipedia/en/f/f2/TEN_Sports_logo.png", group:"Sports", url:"" },
    ];
    showToast("📂 Loaded demo channels. Add channels.json to load yours.");
    init();
  }
}

// ── INIT ───────────────────────────────────────────────
function init() {
  buildCategories();
  applyFilter();
}

function buildCategories() {
  const groups = ['all', ...new Set(allChannels.map(c => c.group).filter(Boolean))];
  const tabs = document.getElementById('catTabs');
  tabs.innerHTML = '';
  groups.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'cat-tab' + (g === currentCat ? ' active' : '');
    btn.dataset.cat = g;
    btn.textContent = g === 'all' ? 'All' : g;
    btn.addEventListener('click', () => {
      currentCat = g;
      document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      applyFilter();
    });
    tabs.appendChild(btn);
  });
}

function applyFilter() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  filteredChannels = allChannels.filter(ch => {
    const matchCat = currentCat === 'all' || ch.group === currentCat;
    const matchQ = !q || ch.name.toLowerCase().includes(q) || (ch.group||'').toLowerCase().includes(q);
    return matchCat && matchQ;
  });
  renderSidebar();
  renderGrid();
}

// ── SIDEBAR ────────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById('channelList');
  const count = document.getElementById('channelCount');
  count.textContent = filteredChannels.length + ' channel' + (filteredChannels.length !== 1 ? 's' : '');

  if (!filteredChannels.length) {
    list.innerHTML = '<div class="state-msg"><p>No channels found</p></div>';
    return;
  }

  list.innerHTML = filteredChannels.map((ch, i) => {
    const idx = allChannels.indexOf(ch);
    const logoHtml = ch.logo
      ? `<img class="channel-logo" src="${ch.logo}" alt="${ch.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        + `<div class="channel-logo-placeholder" style="display:none">${initials(ch.name)}</div>`
      : `<div class="channel-logo-placeholder">${initials(ch.name)}</div>`;
    const isActive = currentChannel && currentChannel.name === ch.name;
    return `<div class="channel-item${isActive?' active':''}" data-idx="${idx}" onclick="selectChannel(${idx})">
      ${logoHtml}
      <div class="channel-info">
        <div class="channel-name">${ch.name}</div>
        <div class="channel-group">${ch.group||''}</div>
      </div>
      <div class="ch-now"><span class="ch-live">●</span></div>
    </div>`;
  }).join('');
}

// ── GRID ───────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('groupedGrid');
  const gridCount = document.getElementById('gridCount');
  const sectionTitle = document.querySelector('.section-title');

  gridCount.textContent = filteredChannels.length;
  sectionTitle.textContent = currentCat === 'all' ? 'All Channels' : currentCat + ' Channels';

  if (!filteredChannels.length) {
    grid.innerHTML = '<div class="state-msg"><svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg><p>No channels found</p></div>';
    return;
  }

  // Group them
  const groups = {};
  filteredChannels.forEach(ch => {
    const g = ch.group || 'Other';
    if (!groups[g]) groups[g] = [];
    groups[g].push(ch);
  });

  let html = '';
  Object.entries(groups).forEach(([gName, channels]) => {
    html += `<div class="group-block">
      <div class="group-label">
        <span class="group-name">${gName}</span>
        <span class="group-line"></span>
        <span class="group-cnt">${channels.length}</span>
      </div>
      <div class="grid">
        ${channels.map(ch => {
          const idx = allChannels.indexOf(ch);
          const isActive = currentChannel && currentChannel.name === ch.name;
          const logoHtml = ch.logo
            ? `<img class="grid-logo" src="${ch.logo}" alt="${ch.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="grid-logo-ph" style="display:none">${initials(ch.name)}</div>`
            : `<div class="grid-logo-ph">${initials(ch.name)}</div>`;
          return `<div class="grid-card${isActive?' active':''}" data-idx="${idx}" onclick="selectChannel(${idx})">
            ${logoHtml}
            <div class="grid-name">${ch.name}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });

  grid.innerHTML = html;
}

// ── PLAY CHANNEL ───────────────────────────────────────
function selectChannel(idx) {
  const ch = allChannels[idx];
  if (!ch) return;
  currentChannel = ch;

  // Update UI active states
  document.querySelectorAll('.channel-item').forEach(el => {
    el.classList.toggle('active', +el.dataset.idx === idx);
  });
  document.querySelectorAll('.grid-card').forEach(el => {
    el.classList.toggle('active', +el.dataset.idx === idx);
  });

  // Now playing bar
  const bar = document.getElementById('nowPlayingBar');
  const npLogo = document.getElementById('npLogo');
  const npName = document.getElementById('npName');
  const npGroup = document.getElementById('npGroup');
  bar.style.display = 'flex';
  npLogo.src = ch.logo || '';
  npLogo.style.display = ch.logo ? '' : 'none';
  npName.textContent = ch.name;
  npGroup.textContent = ch.group || '';

  // Overlay
  document.getElementById('overlayLogo').src = ch.logo || '';
  document.getElementById('overlayName').textContent = ch.name;
  document.getElementById('overlayGroup').textContent = ch.group || '';

  // Player
  const placeholder = document.getElementById('playerPlaceholder');
  placeholder.style.display = 'none';
  playStream(ch.url);

  // On mobile, close sidebar
  if (window.innerWidth <= 768) closeSidebar();

  // Scroll player into view
  document.getElementById('main').scrollTo({ top: 0, behavior: 'smooth' });
}

function playStream(url) {
  const video = document.getElementById('videoPlayer');
  const loading = document.getElementById('playerLoading');

  if (hls) { hls.destroy(); hls = null; }

  if (!url) {
    showToast("⚠️ No stream URL for this channel");
    return;
  }

  loading.classList.add('show');

  if (Hls.isSupported()) {
    hls = new Hls({ enableWorker: true, lowLatencyMode: true });
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      loading.classList.remove('show');
      video.play().catch(() => {});
    });
    hls.on(Hls.Events.ERROR, (e, data) => {
      if (data.fatal) {
        loading.classList.remove('show');
        showToast("⚠️ Stream error — check URL or network");
      }
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
    video.addEventListener('loadedmetadata', () => {
      loading.classList.remove('show');
      video.play().catch(() => {});
    }, { once: true });
  } else {
    loading.classList.remove('show');
    showToast("❌ HLS not supported in this browser");
  }
}

// ── HELPERS ────────────────────────────────────────────
function initials(name) {
  return name.split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

// ── MOBILE SIDEBAR ─────────────────────────────────────
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('backdrop').classList.remove('show');
}

document.getElementById('menuBtn').addEventListener('click', () => {
  const sb = document.getElementById('sidebar');
  const bd = document.getElementById('backdrop');
  sb.classList.toggle('open');
  bd.classList.toggle('show');
});
document.getElementById('backdrop').addEventListener('click', closeSidebar);

// ── SEARCH ─────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', applyFilter);

// ── BOOT ───────────────────────────────────────────────
loadChannels();
</script>
</body>
</html>
